<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title | default: site.title }}</title>
    <style>
      :root {
        color-scheme: light;
        --accent: #2569c9;
        --ink: #24292f;
        --muted: #57606a;
        --border: #d8dee4;
        --paper: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--paper);
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        font-size: 18px;
        line-height: 1.6;
      }

      .page {
        width: min(100%, 860px);
        margin: 0 auto;
        padding: 56px 24px 72px;
      }

      .site-title {
        display: block;
        margin: 0 0 22px;
        padding-bottom: 22px;
        border-bottom: 1px solid var(--border);
        color: var(--accent);
        cursor: default;
        font-size: clamp(34px, 8vw, 56px);
        font-weight: 700;
        line-height: 1.1;
        pointer-events: none;
      }

      h1,
      h2 {
        padding-bottom: 0.3em;
        border-bottom: 1px solid var(--border);
        line-height: 1.25;
      }

      h1 {
        margin: 0 0 24px;
        font-size: clamp(38px, 8vw, 64px);
      }

      h2 {
        margin-top: 42px;
        font-size: clamp(28px, 6vw, 44px);
      }

      p,
      ul {
        margin: 0 0 24px;
      }

      li {
        margin-bottom: 10px;
      }

      a {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <main class="page">
      <span class="site-title">{{ site.title | default: "Side Quest Slayer" }}</span>
      {{ content }}
    </main>
  </body>
</html>
